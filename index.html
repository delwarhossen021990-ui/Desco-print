<!DOCTYPE html>
<html>

<head>
  <title>DESCO Receipt Print</title>

  <style>
    body{
      font-family: Arial;
      padding:20px;
      background:#f5f5f5;
    }

    input{
      width:100%;
      padding:12px;
      font-size:18px;
    }

    button{
      width:100%;
      padding:15px;
      margin-top:10px;
      background:green;
      color:white;
      border:none;
      font-size:18px;
    }

    .card{
      background:white;
      padding:15px;
      margin-top:15px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<h2>DESCO Receipt Print</h2>

<input
id="meter"
placeholder="Enter Meter Number"
/>

<button onclick="getReceipt()">
Fetch Receipt
</button>

<div id="result"></div>

<script>

async function getReceipt(){

  const meter =
  document.getElementById("meter").value;

  const result =
  document.getElementById("result");

  result.innerHTML = "Loading...";

  try{

    const url =
    "https://desco-backend-xx3z.onrender.com/receipt/" + meter;

    const response =
    await fetch(url);

    const data =
    await response.json();

    console.log(data);

    result.innerHTML = "";

    data.forEach(item=>{

      result.innerHTML += `
      <div class="card">

      <h3>${item.amount} TK</h3>

      <p>Name: ${item.name}</p>

      <p>Meter: ${item.meter}</p>

      <p>Token: ${item.token}</p>

      </div>
      `;

    });

  }catch(error){

    console.log(error);

    result.innerHTML =
    "FAILED API";

  }

}

</script>

</body>
</html>
