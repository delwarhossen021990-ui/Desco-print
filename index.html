<!DOCTYPE html>
<html>

<head>

<title>DESCO Receipt Print</title>

<meta name="viewport"
content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
padding:20px;
background:#f5f5f5;
}

input{
width:100%;
padding:15px;
font-size:20px;
margin-bottom:10px;
}

button{
width:100%;
padding:15px;
font-size:20px;
background:green;
color:white;
border:none;
margin-top:10px;
cursor:pointer;
}

.card{
background:white;
padding:15px;
margin-top:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<h1>DESCO Receipt Print</h1>

<input
id="meter"
placeholder="Enter Meter Number">

<button id="fetchBtn">

Fetch Receipt

</button>

<div id="result"></div>

<script>

document
.getElementById("fetchBtn")
.addEventListener("click", getReceipt);

async function getReceipt(){

const meter =
document.getElementById("meter").value;

const result =
document.getElementById("result");

result.innerHTML = "Loading...";

try{

const response = await fetch(
"https://desco-backend-xx3z.onrender.com/receipt/" + meter
);

const data = await response.json();

result.innerHTML = "";

data.forEach(item=>{

const div =
document.createElement("div");

div.className = "card";

div.innerHTML = `

<h2>${item.amount} TK</h2>

<p>
Name:
${item.name}
</p>

<p>
Meter:
${item.meter}
</p>

<p>
Token:
${item.token}
</p>

<button onclick='printReceipt(${JSON.stringify(item)})'>

Print

</button>

`;

result.appendChild(div);

});

}catch(err){

console.log(err);

result.innerHTML = `
<h2 style="color:red;">
FAILED
</h2>
`;

}

}

function printReceipt(item){

const text = `

DESCO

Date:
${item.date}

Name:
${item.name}

Meter:
${item.meter}

Amount:
${item.amount}

TOKEN:
${item.token}

`;

window.location.href =
"rawbt:base64," + btoa(text);

}

</script>

</body>

</html>
